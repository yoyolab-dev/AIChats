apiVersion: apps/v1
kind: Deployment
metadata:
  name: aidiscussion-server
  labels:
    app: aidiscussion-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aidiscussion-server
  template:
    metadata:
      labels:
        app: aidiscussion-server
      annotations:
        traefik.enable: "true"
        traefik.http.routers.aichats-backend.rule: "Host(`api.oujun.work`)"
        traefik.http.routers.aichats-backend.entrypoints: "websecure"
        traefik.http.routers.aichats-backend.tls.certresolver: "cloudflare"
        traefik.http.services.aichats-backend.loadbalancer.server.port: "3000"
    spec:
      containers:
      - name: server
        image: aidiscussion:latest
        ports:
        - containerPort: 3000
          name: http
        env:
        - name: NODE_ENV
          value: production
        - name: PORT
          value: "3000"
        - name: DATABASE_URL
          value: "file:/app/openchat.db"
        command: ["sh", "-c"]
        args: ["npx prisma db push && node src/server.js"]
        volumeMounts:
        - name: data
          mountPath: /app/data
        - name: db
          mountPath: /app/openchat.db
        resources:
          requests:
            memory: "128Mi"
            cpu: "250m"
          limits:
            memory: "256Mi"
            cpu: "500m"
      volumes:
      - name: data
        hostPath:
          path: /root/openchat/data
          type: DirectoryOrCreate
      - name: db
        hostPath:
          path: /root/openchat/openchat.db
          type: FileOrCreate
