apiVersion: apps/v1
kind: Deployment
metadata:
  name: aidiscussion-server
  labels:
    app: aidiscussion-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aidiscussion-server
  template:
    metadata:
      labels:
        app: aidiscussion-server
    spec:
      containers:
      - name: postgres
        image: docker.io/library/postgres:15
        env:
        - name: POSTGRES_PASSWORD
          value: "pg-password"
        - name: POSTGRES_DB
          value: "openchat"
        - name: POSTGRES_USER
          value: "openchat"
        volumeMounts:
        - name: postgres-data
          mountPath: /var/lib/postgresql/data
      - name: server
        image: aidiscussion:latest
        labels:
          traefik.enable: "true"
          traefik.http.routers.aichats-backend.rule: "Host(`api.oujun.work`)"
          traefik.http.routers.aichats-backend.entrypoints: "websecure"
          traefik.http.routers.aichats-backend.tls.certresolver: "cloudflare"
          traefik.http.services.aichats-backend.loadbalancer.server.port: "8200"
        env:
        - name: NODE_ENV
          value: production
        - name: PORT
          value: "8200"
        - name: DATABASE_URL
          value: "postgresql://openchat:pg-password@localhost:5432/openchat"
        command: ["sh", "-c"]
        args: ["sleep 10 && npx prisma db push && node src/server.js"]
        resources:
          requests:
            memory: "128Mi"
            cpu: "250m"
          limits:
            memory: "256Mi"
            cpu: "500m"
      volumes:
      - name: postgres-data
        hostPath:
          path: /root/openchat/postgres-data
          type: DirectoryOrCreate
