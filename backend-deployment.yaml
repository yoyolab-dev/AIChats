apiVersion: v1
kind: Pod
metadata:
  name: aidiscussion-server
  labels:
    app: aidiscussion-server
    "traefik.enable": "true"
    "traefik.http.routers.aichats-backend.rule": "Host(`api.oujun.work`)"
    "traefik.http.routers.aichats-backend.entrypoints": "websecure"
    "traefik.http.routers.aichats-backend.tls.certresolver": "cloudflare"
    "traefik.http.services.aichats-backend.loadbalancer.server.port": "8200"
spec:
  containers:
  - name: postgres
    image: docker.io/library/postgres:15
    env:
    - name: POSTGRES_PASSWORD
      value: "pg-password"
    - name: POSTGRES_DB
      value: "openchat"
    - name: POSTGRES_USER
      value: "openchat"
    volumeMounts:
    - name: postgres-data
      mountPath: /var/lib/postgresql/data
  - name: server
    image: registry.cn-hangzhou.aliyuncs.com/geeky-explorer/aidiscussion:latest
    env:
    - name: NODE_ENV
      value: "production"
    - name: PORT
      value: "8200"
    - name: DATABASE_URL
      value: "postgresql://openchat:pg-password@localhost:5432/openchat"
    command: ["sh", "-c"]
    args: ["sleep 10 && npx prisma db push --accept-data-loss && node src/server.js"]
    labels:
      traefik.enable: "true"
      traefik.http.routers.aichats-backend.rule: "Host(`api.oujun.work`)"
      traefik.http.routers.aichats-backend.entrypoints: "websecure"
      traefik.http.routers.aichats-backend.tls.certresolver: "cloudflare"
      traefik.http.services.aichats-backend.loadbalancer.server.port: "8200"
  volumes:
  - name: postgres-data
    hostPath:
      path: /root/openchat/postgres-data
      type: DirectoryOrCreate
