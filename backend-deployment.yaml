apiVersion: v1
kind: Pod
metadata:
  name: aichats-backend
  labels:
    app: aichats-backend
    "traefik.enable": "true"
    "traefik.http.routers.aichats-backend.rule": "Host(`api.oujun.work`)"
    "traefik.http.routers.aichats-backend.entrypoints": "websecure"
    "traefik.http.routers.aichats-backend.tls.certresolver": "cloudflare"
    "traefik.http.services.aichats-backend.loadbalancer.server.port": "8200"
spec:
  containers:
    - name: aichats-backend
      image: registry.cn-hangzhou.aliyuncs.com/geeky-explorer/aichats-backend:latest
      env:
        - name: DATABASE_URL
          valueFrom:
            secretRef:
              name: aichats-secret
              key: database-url
        - name: NODE_ENV
          value: "production"
      ports:
        - containerPort: 8200
          name: http
