name: Build and Push Docker Images

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装依赖
        working-directory: ./backend
        run: npm ci

      - name: 同步数据库 Schema (测试库)
        working-directory: ./backend
        env:
          DATABASE_URL: file:./dev.test.db
        run: npx prisma db push --accept-data-loss

      - name: 运行后端测试 (Jest)
        working-directory: ./backend
        env:
          DATABASE_URL: file:./dev.test.db
          TEST_DATABASE_URL: file:./dev.test.db
          NODE_ENV: test
        run: npm test

      - name: 安装前端依赖
        working-directory: ./frontend
        run: npm ci

      - name: 运行前端单元测试 (Vitest)
        working-directory: ./frontend
        run: npm test

      - name: 登录阿里云容器镜像服务
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ALIYUN_REGISTRY }}
          username: ${{ secrets.ALIYUN_REGISTRY_USER }}
          password: ${{ secrets.ALIYUN_REGISTRY_PASSWORD }}

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 获取版本号
        id: version
        run: |
          VERSION=$(date +%Y%m%d)-${GITHUB_SHA::8}
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: 构建并推送后端镜像
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.backend
          push: true
          no-cache: true
          build-args: |
            NODE_ENV=production
          tags: |
            ${{ secrets.ALIYUN_REGISTRY }}/${{ secrets.ALIYUN_NAME_SPACE }}/aichats-backend:latest
            ${{ secrets.ALIYUN_REGISTRY }}/${{ secrets.ALIYUN_NAME_SPACE }}/aichats-backend:${{ steps.version.outputs.VERSION }}

      - name: 构建并推送前端镜像
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          no-cache: true
          tags: |
            ${{ secrets.ALIYUN_REGISTRY }}/${{ secrets.ALIYUN_NAME_SPACE }}/aichats-frontend:latest

      - name: Prepare deployment manifests
        run: |
          mkdir -p deploy/backend deploy/frontend
          cp backend-deployment.yaml deploy/backend/deployment.yaml
          cp frontend-deployment.yaml deploy/frontend/deployment.yaml

      - name: 上传部署文件
        uses: actions/upload-artifact@v4
        with:
          name: backend-deployment
          path: deploy/backend/
      - name: 上传前端部署文件
        uses: actions/upload-artifact@v4
        with:
          name: frontend-deployment
          path: deploy/frontend/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - name: 下载后端部署文件
        uses: actions/download-artifact@v4
        with:
          name: backend-deployment
      - name: 下载前端部署文件
        uses: actions/download-artifact@v4
        with:
          name: frontend-deployment

      - name: 配置 SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          echo -e "Host *\n\tStrictHostKeyChecking no\n" > ~/.ssh/config

      - name: 上传并部署后端
        run: |
          ls -la
          if [ -d backend-deployment ]; then
            cd backend-deployment
            ls -la
            scp -i ~/.ssh/id_rsa -P ${{ secrets.SERVER_PORT }} *.yaml ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/root/
          else
            echo "backend-deployment directory not found, searching..."
            find . -name "*.yaml" -maxdepth 2
            # fallback: copy any yaml files from current dir
            scp -i ~/.ssh/id_rsa -P ${{ secrets.SERVER_PORT }} *.yaml ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/root/ || true
          fi
          ssh -i ~/.ssh/id_rsa -p ${{ secrets.SERVER_PORT }} ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} <<EOF
            set -e
            cd /root
            podman pull ${{ secrets.ALIYUN_REGISTRY }}/${{ secrets.ALIYUN_NAME_SPACE }}/aidiscussion:latest
            podman kube play --replace deployment.yaml
            echo "Backend deployed"
          EOF

      - name: 上传并部署前端
        run: |
          ls -la
          if [ -d frontend-deployment ]; then
            cd frontend-deployment
            ls -la
            scp -i ~/.ssh/id_rsa -P ${{ secrets.SERVER_PORT }} deployment.yaml ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/root/
          else
            echo "frontend-deployment directory not found, searching..."
            find . -name "deployment.yaml" -maxdepth 2
            scp -i ~/.ssh/id_rsa -P ${{ secrets.SERVER_PORT }} frontend-deployment/deployment.yaml ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/root/ || true
          fi
          ssh -i ~/.ssh/id_rsa -p ${{ secrets.SERVER_PORT }} ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} <<EOF
            set -e
            cd /root
            podman pull ${{ secrets.ALIYUN_REGISTRY }}/${{ secrets.ALIYUN_NAME_SPACE }}/aichats-frontend:latest
            podman kube play --replace deployment.yaml
            echo "Frontend deployed"
          EOF

      - name: 清理本地 SSH 密钥
        if: always()
        run: rm -rf ~/.ssh/id_rsa ~/.ssh/config
