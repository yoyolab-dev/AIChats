server {
    listen 80;
    server_name localhost;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # API proxy - 使用宿主机网络访问后端
    # 在 podman 环境中，容器通过 traefik 网络访问后端
    location /api/ {
        proxy_pass https://api.oujun.work/;
        proxy_set_header Host api.oujun.work;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_ssl_server_name on;
    }
}